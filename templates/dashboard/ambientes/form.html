{% extends "base_dashboard.html" %}

{% block title %}{{ titulo }} — CasaGestor{% endblock %}
{% block page_title %}{{ titulo }}{% endblock %}

{% block content %}

<div class="mb-4">
    <nav aria-label="breadcrumb">
        <ol class="breadcrumb mb-0">
            <li class="breadcrumb-item"><a href="{{ url_for('home') }}">Dashboard</a></li>
            <li class="breadcrumb-item"><a href="{{ url_for('ambientes_listar') }}">Ambientes</a></li>
            <li class="breadcrumb-item active">{{ titulo }}</li>
        </ol>
    </nav>
</div>

<form action="" method="post">
    <div class="card border-0 shadow-sm mb-4">
        <div class="card-header bg-white fw-semibold py-3">
            <i class="bi bi-house-door me-2 text-primary"></i>Dados do Ambiente
        </div>
        <div class="card-body p-4">
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label fw-semibold">Nome do Ambiente <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" name="nome"
                           value="{{ item.nome if item else '' }}"
                           placeholder="Ex: Cozinha, Quintal, Garagem..." required>
                </div>
                
                <div class="col-md-3">
                    <label class="form-label fw-semibold">Tipo</label>
                    <select class="form-select" name="tipo">
                        <option value="Interno" {% if not item or item.tipo == 'Interno' %}selected{% endif %}>Interno</option>
                        <option value="Externo" {% if item and item.tipo == 'Externo' %}selected{% endif %}>Externo</option>
                    </select>
                </div>

                <div class="col-md-3">
                    <label class="form-label fw-semibold">Status</label>
                    <select class="form-select" name="status">
                        <option value="Ativo" {% if not item or item.status == 'Ativo' %}selected{% endif %}>Ativo</option>
                        <option value="Inativo" {% if item and item.status == 'Inativo' %}selected{% endif %}>Inativo</option>
                    </select>
                </div>

                <div class="col-12">
                    <label class="form-label fw-semibold">Descrição</label>
                    <textarea class="form-control" name="descricao" rows="3"
                              placeholder="Breve descrição do ambiente">{{ item.descricao if item else '' }}</textarea>
                </div>
            </div>
        </div>
    </div>

    <div class="d-flex justify-content-between">
        <a href="{{ url_for('ambientes_listar') }}" class="btn btn-outline-secondary">
            <i class="bi bi-arrow-left me-2"></i>Cancelar
        </a>
        <button type="submit" class="btn btn-primary px-4">
            <i class="bi bi-check-lg me-2"></i>Salvar
        </button>
    </div>
</form>

{% endblock %}
