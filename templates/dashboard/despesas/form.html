{% extends "base_dashboard.html" %}

{% block title %}{{ titulo }} — CasaGestor{% endblock %}
{% block page_title %}{{ titulo }}{% endblock %}

{% block content %}

<div class="mb-4">
    <nav aria-label="breadcrumb">
        <ol class="breadcrumb mb-0">
            <li class="breadcrumb-item"><a href="{{ url_for('home') }}">Dashboard</a></li>
            <li class="breadcrumb-item"><a href="{{ url_for('despesas_listar') }}">Despesas</a></li>
            <li class="breadcrumb-item active">{{ titulo }}</li>
        </ol>
    </nav>
</div>

<form action="" method="post">
    <div class="card border-0 shadow-sm mb-4">
        <div class="card-header bg-white fw-semibold py-3">
            <i class="bi bi-wallet2 me-2 text-primary"></i>Dados da Despesa
        </div>
        <div class="card-body p-4">
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label fw-semibold">Descrição (Ex: Conta de Luz)</label>
                    <input type="text" class="form-control" name="descricao"
                           value="{{ item.descricao if item else '' }}" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-semibold">Valor (R$)</label>
                    <input type="number" step="0.01" class="form-control" name="valor"
                           value="{{ item.valor if item else '' }}" required>
                </div>
                
                <div class="col-md-4">
                    <label class="form-label fw-semibold">Data de Vencimento</label>
                    <input type="date" class="form-control" name="vencimento" 
                           value="{{ item.vencimento if item else '' }}" required>
                </div>
                <div class="col-md-4">
                    <label class="form-label fw-semibold">Status</label>
                    <select class="form-select" name="status">
                        <option value="Pendente" {% if not item or item.status == 'Pendente' %}selected{% endif %}>Pendente</option>
                        <option value="Pago" {% if item and item.status == 'Pago' %}selected{% endif %}>Pago</option>
                    </select>
                </div>
                <div class="col-md-4">
                    <label class="form-label fw-semibold">Responsável</label>
                    <select class="form-select" name="usuario_id" required>
                        <option value="">Selecione…</option>
                        {% for u in lista_usuarios %}
                            <option value="{{ u.id_usuario }}" {% if item and item.usuario_id == u.id_usuario %}selected{% endif %}>
                                {{ u.nome }}
                            </option>
                        {% endfor %}
                    </select>
                </div>
            </div>
        </div>
    </div>

    <div class="d-flex justify-content-between">
        <a href="{{ url_for('despesas_listar') }}" class="btn btn-outline-secondary">
            <i class="bi bi-arrow-left me-2"></i>Cancelar
        </a>
        <button type="submit" class="btn btn-primary px-4">
            <i class="bi bi-check-lg me-2"></i>Salvar
        </button>
    </div>
</form>

{% endblock %}
