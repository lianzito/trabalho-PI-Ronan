{% extends "base_dashboard.html" %}

{% block title %}{{ titulo }} — CasaGestor{% endblock %}
{% block page_title %}{{ titulo }}{% endblock %}

{% block content %}

<div class="mb-4">
    <nav aria-label="breadcrumb">
        <ol class="breadcrumb mb-0">
            <li class="breadcrumb-item"><a href="{{ url_for('home') }}">Dashboard</a></li>
            <li class="breadcrumb-item"><a href="{{ url_for('funcoes_listar') }}">Funções</a></li>
            <li class="breadcrumb-item active">{{ titulo }}</li>
        </ol>
    </nav>
</div>

<form action="" method="POST">
    <div class="card border-0 shadow-sm mb-4">
        <div class="card-header bg-white fw-semibold py-3">
            <i class="bi bi-shield-fill me-2 text-primary"></i>Dados da Função
        </div>
        <div class="card-body p-4">
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label fw-semibold">Nome da Função <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" name="nome" value="{{ item.nome if item else '' }}" placeholder="Ex.: Administrador" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-semibold">Status</label>
                    <select class="form-select" name="status">
                        <option value="Ativo" {% if not item or item.status == 'Ativo' %}selected{% endif %}>Ativo</option>
                        <option value="Inativo" {% if item and item.status == 'Inativo' %}selected{% endif %}>Inativo</option>
                    </select>
                </div>
                <div class="col-12">
                    <label class="form-label fw-semibold">Descrição</label>
                    <textarea class="form-control" rows="3" name="descricao"
                        placeholder="Descreva as responsabilidades desta função">{{ item.descricao if item else '' }}</textarea>
                </div>
            </div>
        </div>
    </div>

    <div class="card border-0 shadow-sm mb-4">
        <div class="card-header bg-white fw-semibold py-3">
            <i class="bi bi-toggles me-2 text-primary"></i>Permissões
        </div>
        <div class="card-body p-4">
            <div class="row g-3"> 
                <div class="col-md-4">
                    <div class="form-check form-switch">
                        <input name="gerenciar_usuarios" class="form-check-input" type="checkbox" id="perm_usuarios" {% if item and item.gerenciar_usuarios %}checked{% endif %}>
                        <label class="form-check-label fw-medium" for="perm_usuarios">Gerenciar Usuários</label>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="form-check form-switch">
                        <input name="gerenciar_funcoes" class="form-check-input" type="checkbox" id="perm_funcoes" {% if item and item.gerenciar_funcoes %}checked{% endif %}>
                        <label class="form-check-label fw-medium" for="perm_funcoes">Gerenciar Funções</label>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="form-check form-switch">
                        <input name="gerenciar_tarefas" class="form-check-input" type="checkbox" id="perm_tarefas" {% if item and item.gerenciar_tarefas %}checked{% endif %}>
                        <label class="form-check-label fw-medium" for="perm_tarefas">Gerenciar Tarefas</label>
                    </div>
                </div>                
            </div>
        </div>
    </div>

    <div class="d-flex justify-content-between">
        <a href="{{ url_for('funcoes_listar') }}" class="btn btn-outline-secondary">
            <i class="bi bi-arrow-left me-2"></i>Cancelar
        </a>
        <button type="submit" class="btn btn-primary px-4">
            <i class="bi bi-check-lg me-2"></i>Salvar Função
        </button>
    </div>
</form>

{% endblock %}
