{% extends "base_dashboard.html" %}

{% block title %}{{ titulo }} — CasaGestor{% endblock %}
{% block page_title %}{{ titulo }}{% endblock %}

{% block content %}

<div class="mb-4">
    <nav aria-label="breadcrumb">
        <ol class="breadcrumb mb-0">
            <li class="breadcrumb-item"><a href="{{ url_for('home') }}">Dashboard</a></li>
            <li class="breadcrumb-item"><a href="{{ url_for('usuarios_listar') }}">Usuários</a></li>
            <li class="breadcrumb-item active">{{ titulo }}</li>
        </ol>
    </nav>
</div>

<form action="{{ url_for('usuarios_alterar', id=item.id_usuario) if modo == 'alterar' else url_for('usuarios_cadastrar') }}" method="POST">
    <div class="row g-4">

        <div class="col-12">
            <div class="card border-0 shadow-sm">
                <div class="card-header bg-primary text-white fw-semibold">
                    <i class="bi bi-person-fill me-2"></i>Dados Pessoais
                </div>
                <div class="card-body p-4">
                    <div class="row g-3">
                        <div class="col-12">
                            <label class="form-label fw-semibold">
                                Nome Completo <span class="text-danger">*</span>
                            </label>
                            <input type="text" name="nome" class="form-control"
                                   value="{{ item.nome if item else '' }}"
                                   placeholder="Nome completo" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">
                                CPF <span class="text-danger">*</span>
                            </label>
                            <input type="text" name="cpf" class="form-control"
                                   value="{{ item.cpf if item else '' }}"
                                   placeholder="000.000.000-00" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">
                                Data de Nascimento <span class="text-danger">*</span>
                            </label>
                            <input type="date" name="data_nascimento" class="form-control"
                                   value="{{ item.data_nascimento if item else '' }}" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">
                                E-mail <span class="text-danger">*</span>
                            </label>
                            <input type="email" name="email" class="form-control"
                                   value="{{ item.email if item else '' }}"
                                   placeholder="seu@email.com" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">
                                Celular <span class="text-danger">*</span>
                            </label>
                            <input type="text" name="celular" class="form-control"
                                   value="{{ item.celular if item else '' }}"
                                   placeholder="(00) 00000-0000" required>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-12">
            <div class="card border-0 shadow-sm">
                <div class="card-header bg-secondary text-white fw-semibold">
                    <i class="bi bi-geo-alt-fill me-2"></i>Endereço
                </div>
                <div class="card-body p-4">
                    <div class="row g-3">
                        <div class="col-md-4">
                            <label class="form-label fw-semibold">
                                CEP <span class="text-danger">*</span>
                            </label>
                            <input type="text" name="cep" class="form-control"
                                   value="{{ item.cep if item else '' }}"
                                   placeholder="00000-000">
                        </div>
                        <div class="col-md-8">
                            <label class="form-label fw-semibold">
                                Logradouro <span class="text-danger">*</span>
                            </label>
                            <input type="text" name="logradouro" class="form-control"
                                   value="{{ item.logradouro if item else '' }}"
                                   placeholder="Rua, Avenida, Travessa…">
                        </div>
                        <div class="col-md-3">
                            <label class="form-label fw-semibold">
                                Número <span class="text-danger">*</span>
                            </label>
                            <input type="text" name="numero" class="form-control"
                                   value="{{ item.numero if item else '' }}"
                                   placeholder="Nº">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label fw-semibold">Complemento</label>
                            <input type="text" name="complemento" class="form-control"
                                   value="{{ item.complemento if item else '' }}"
                                   placeholder="Apto, Bloco…">
                        </div>
                        <div class="col-md-5">
                            <label class="form-label fw-semibold">
                                Bairro <span class="text-danger">*</span>
                            </label>
                            <input type="text" name="bairro" class="form-control"
                                   value="{{ item.bairro if item else '' }}"
                                   placeholder="Bairro">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">
                                Cidade <span class="text-danger">*</span>
                            </label>
                            <input type="text" name="cidade" class="form-control"
                                   value="{{ item.cidade if item else '' }}"
                                   placeholder="Cidade">
                        </div>
                        <div class="col-md-3">
                            <label class="form-label fw-semibold">
                                Estado <span class="text-danger">*</span>
                            </label>
                            <select name="estado" class="form-select" required>
                                <option value="">UF</option>
                                {% for uf in ['AC', 'AL', 'AP', 'AM', 'BA', 'CE', 'DF', 'ES', 'GO', 'MA', 'MT', 'MS', 'MG', 'PA', 'PB', 'PR', 'PE', 'PI', 'RJ', 'RN', 'RS', 'RO', 'RR', 'SC', 'SP', 'SE', 'TO'] %}
                                    <option value="{{ uf }}" {{ 'selected' if item and item.estado == uf else '' }}>{{ uf }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label fw-semibold">País</label>
                            <input type="text" name="pais" class="form-control" value="Brasil" readonly>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-12">
            <div class="card border-0 shadow-sm">
                <div class="card-header bg-dark text-white fw-semibold">
                    <i class="bi bi-lock-fill me-2"></i>Dados de Acesso
                </div>
                <div class="card-body p-4">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">
                                Senha <span class="text-danger">*</span>
                            </label>
                            <input type="password" name="senha" class="form-control" placeholder="Mínimo 8 caracteres" {{ 'required' if not item else '' }}>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">
                                Confirmar Senha <span class="text-danger">*</span>
                            </label>
                            <input type="password" name="confirmar_senha" class="form-control" placeholder="Repita a senha" {{ 'required' if not item else '' }}>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">
                                Função <span class="text-danger">*</span>
                            </label>
                            <select name="funcao_id" class="form-select" required>
                                <option value="">Selecione uma função</option>
                                {% for f in lista_funcoes %}
                                <option value="{{f.id_funcao}}" {{ 'selected' if item and item.funcao_id == f.id_funcao else '' }}>{{f.nome}}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Status</label>
                            <select name="status" class="form-select">
                                <option value="Ativo" {{ 'selected' if not item or item.status == 'Ativo' else '' }}>Ativo</option>
                                <option value="Inativo" {{ 'selected' if item and item.status == 'Inativo' else '' }}>Inativo</option>
                            </select>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-12 d-flex justify-content-between">
            <a href="{{ url_for('usuarios_listar') }}" class="btn btn-outline-secondary">
                <i class="bi bi-arrow-left me-2"></i>Cancelar
            </a>
            <button type="submit" class="btn btn-primary px-4">
                <i class="bi bi-check-lg me-2"></i>Salvar
            </button>
        </div>

    </div>
</form>

{% endblock %}
